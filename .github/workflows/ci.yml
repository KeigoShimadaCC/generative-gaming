name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  CI: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Root Vitest
        run: pnpm test

      - name: Integration Vitest
        run: pnpm exec vitest run --config tests/integration/vitest.config.ts --reporter verbose

      - name: Golden Vitest
        run: pnpm exec vitest run --config tests/golden/vitest.config.ts --reporter verbose

      - name: App Vitest - input
        run: pnpm exec vitest run --config app/input/vitest.config.ts --reporter verbose

      - name: App Vitest - artifacts
        run: pnpm exec vitest run --config app/components/artifacts/vitest.config.ts --reporter verbose

      - name: App Vitest - diary
        run: pnpm exec vitest run --config app/components/diary/vitest.config.ts --reporter verbose

      - name: App Vitest - grid
        run: pnpm exec vitest run --config app/components/grid/vitest.config.ts --reporter verbose

      - name: App Vitest - hud
        run: pnpm exec vitest run --config app/components/hud/vitest.config.ts --reporter verbose

      - name: App Vitest - log
        run: pnpm exec vitest run --config app/components/log/vitest.config.ts --reporter verbose

      - name: App Vitest - panels
        run: pnpm exec vitest run --config app/components/panels/vitest.config.ts --reporter verbose

      - name: App Vitest - run index
        run: pnpm exec vitest run --config app/components/runindex/vitest.config.ts --reporter verbose

      - name: App Vitest - settings
        run: pnpm exec vitest run --config app/components/settings/vitest.config.ts --reporter verbose

      - name: App Vitest - title
        run: pnpm exec vitest run --config app/components/title/vitest.config.ts --reporter verbose

      - name: App Vitest - transition
        run: pnpm exec vitest run --config app/components/transition/vitest.config.ts --reporter verbose

      - name: Determinism Audit Vitest
        run: pnpm exec vitest run --config tests/determinism-audit/vitest.config.ts --reporter verbose

      - name: Mocked eval smoke
        env:
          EVAL_ID: ci-smoke-${{ github.run_id }}
        run: |
          pnpm dlx tsx <<'TS'
          import { createMockDirectorProvider } from "./src/director/provider/index.ts";
          import {
            defaultEvalRunnerConfig,
            formatEvalSmokeOutput,
            runEvalSuite,
          } from "./src/evals/runner/run.ts";
          import type { DepthBand } from "./src/schemas/entities/index.ts";
          import {
            validLowestManifestFixture,
            validMiddleManifestFixture,
            validShallowsManifestFixture,
          } from "./src/schemas/fixtures/manifest.ts";
          import type { FloorManifest } from "./src/schemas/manifest.ts";

          const evalId = process.env.EVAL_ID;
          if (evalId === undefined || evalId.length === 0) {
            throw new Error("EVAL_ID is required");
          }

          const baselineEvalId = "ci-mock-baseline";
          const fixtureForBand = (band: DepthBand): FloorManifest => {
            switch (band) {
              case "shallows":
                return validShallowsManifestFixture;
              case "middle":
                return validMiddleManifestFixture;
              case "lowest":
                return validLowestManifestFixture;
            }
          };

          const result = await runEvalSuite({
            ...defaultEvalRunnerConfig({ mode: "mock", n: 1, evalId }),
            providerFactory: ({ band, depth, persona, generationIndex }) => {
              const generationRunId = `${baselineEvalId}-${band}-${persona}-${generationIndex + 1}`;
              const fixture = fixtureForBand(band);
              const manifest = {
                ...fixture,
                depth,
                params: {
                  ...fixture.params,
                  seed: `${generationRunId}:seed`,
                },
              };

              return createMockDirectorProvider({
                manifest,
                raw: JSON.stringify(manifest),
                latencyMs: 10 + generationIndex,
                tokens: {
                  inputTokens: 100 + generationIndex,
                  outputTokens: 50 + generationIndex,
                  totalTokens: 150 + (generationIndex * 2),
                },
              });
            },
          });

          process.stdout.write(`${formatEvalSmokeOutput(result)}\n`);
          TS

      - name: Eval threshold check
        env:
          EVAL_ID: ci-smoke-${{ github.run_id }}
        run: pnpm dlx tsx tests/eval-baselines/compare.ts tests/eval-baselines/mock-baseline.json runs/evals/${EVAL_ID}/report.json

  e2e:
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4.2.4
        with:
          path: .cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright e2e
        run: pnpm run e2e
